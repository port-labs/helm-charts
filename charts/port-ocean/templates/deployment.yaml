{{- if eq .Values.workload.kind "Deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "port-ocean.deploymentName" . }}
  labels:
    {{- include "port-ocean.labels" . | nindent 4 }}
spec:
  strategy:
    type: {{ .Values.workload.deployment.rolloutStrategy | default "Recreate" }}
  replicas: {{ if and (hasKey .Values.workload.deployment "replicas") (eq (.Values.workload.deployment.replicas | int) 0) }}0{{ else }}1{{ end }}
  selector:
    matchLabels:
      app: {{ include "port-ocean.deploymentName" . }}
      {{- include "port-ocean.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ include "port-ocean.deploymentName" . }}
        {{- include "port-ocean.labels" . | nindent 8 }}
    spec:
      {{- if or .Values.podServiceAccount.name .Values.podServiceAccount.create }}
      serviceAccountName: {{ include "port-ocean.serviceAccountName" . }}
      {{- end }}
      terminationGracePeriodSeconds: {{ default 30 .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- with .Values.dnsConfig }}
      dnsConfig: {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- if .Values.podSecurityContext }}
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- end }}
      initContainers:
        {{- if .Values.extraInitContainers }}
        {{- tpl (toYaml .Values.extraInitContainers) . | nindent 8 }}
        {{- end }}
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgresql
          image: {{ .Values.postgresql.image }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.global.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
        {{- end }}
      containers:
      - name: {{ include "port-ocean.containerName" . }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        image: {{ include "port-ocean.image" . }}
        {{- if .Values.service.enabled }}
        securityContext:
          {{- if .Values.containerSecurityContext }}
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
          {{- end }}
        resources:
          {{- if .Values.resources }}
          {{- toYaml .Values.resources | nindent 10 }}
          {{- end }}
        ports:
        - containerPort: {{.Values.service.port}}
          protocol: TCP
        {{- end }}
        {{- if or .Values.selfSignedCertificate.enabled .Values.postgresql.enabled (and .Values.liveEvents.baseUrl (not .Values.liveEvents.worker.enabled)) .Values.extraEnv }}
        env:
        {{- if .Values.selfSignedCertificate.enabled }}
          - name: SSL_CERT_FILE
            value: /etc/ssl/certs/ca-certificates.crt
          - name: REQUESTS_CA_BUNDLE
            value: /etc/ssl/certs/ca-certificates.crt
        {{- end }}
        {{- if .Values.postgresql.enabled }}
          - name: OCEAN__DATABASE__HOST
            value: {{ include "port-ocean.name" . }}-postgresql
          - name: OCEAN__DATABASE__PORT
            value: '5432'
          - name: OCEAN__DATABASE__NAME
            value: {{ .Values.postgresql.global.postgresql.auth.database }}
          - name: OCEAN__DATABASE__USERNAME
            value: {{ .Values.postgresql.global.postgresql.auth.username }}
          - name: OCEAN__DATABASE__PASSWORD
            value: {{ .Values.postgresql.global.postgresql.auth.password }}
        {{- end }}
        {{- if and .Values.liveEvents.baseUrl (not .Values.liveEvents.worker.enabled) }}
          - name: OCEAN__BASE_URL
            value: {{ .Values.liveEvents.baseUrl }}
        {{- end }}
        {{- if .Values.extraEnv }}
          {{- tpl (toYaml .Values.extraEnv) . | nindent 10 }}
        {{- end }}
        {{- end }}
        envFrom:
          - configMapRef:
              name: {{ include "port-ocean.configMapName" . }}
          {{- include "port-ocean.additionalSecrets" . | nindent 10 }}
        volumeMounts:
        {{- if .Values.extraVolumeMounts }}
          {{- tpl (toYaml .Values.extraVolumeMounts) . | nindent 10 }}
        {{- end }}
        {{- if .Values.selfSignedCertificate.enabled }}
          - name: certificates
            mountPath: /usr/local/share/ca-certificates/cert.crt
            subPath: cert.crt
            readOnly: true
        {{- end }}
        {{- if eq .Values.integration.processExecution.mode "multi_process" }}
          - name: prometheus-metrics
            mountPath: "{{ .Values.integration.processExecution.prometheusMultiProcessDir }}"
        {{- end }}
        {{- if (.Values.livenessProbe).enabled}}
        livenessProbe:
          httpGet:
            path: /docs
            port: {{.Values.service.port}}
          initialDelaySeconds: {{ default 30 .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ default 10 .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ default 5 .Values.livenessProbe.timeoutSeconds }}
          successThreshold: 1
          failureThreshold: {{ default 3 .Values.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if (.Values.readinessProbe).enabled}}
        readinessProbe:
          httpGet:
            path: /docs
            port: {{.Values.service.port}}
          initialDelaySeconds: {{ default 30 .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ default 10 .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ default 5 .Values.readinessProbe.timeoutSeconds }}
          successThreshold: {{ default 2 .Values.readinessProbe.successThreshold }}
          failureThreshold: {{ default 3 .Values.readinessProbe.failureThreshold }}
        {{- end }}
      {{- if .Values.healthChecker.enabled }}
      - name: health-checker
        image: {{ .Values.healthChecker.image }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        env:
          - name: OCEAN_HEALTH_CHECKER__INTERVAL_SECONDS
            value: {{ .Values.healthChecker.intervalSeconds | default 10 | quote }}
        envFrom:
          - configMapRef:
              name: {{ include "port-ocean.configMapName" . }}
          {{- include "port-ocean.additionalSecrets" . | nindent 10 }}
        command:
          - /bin/sh
          - -c
          - |
              set -eu
              apk add --no-cache bash curl jq >/dev/null
              exec /bin/bash <<'OCEAN_HEALTHCHECK_SCRIPT'
              #!/usr/bin/env bash
              set -euo pipefail

              IS_HEALTHY_URL="http://localhost:{{.Values.service.port}}/isHealthy"
              INTERVAL_SECONDS="${OCEAN_HEALTH_CHECKER__INTERVAL_SECONDS:-10}"
              TIMEOUT_SECONDS="${OCEAN_HEALTH_CHECKER__TIMEOUT_SECONDS:-5}"

              PORT_BASE_URL="${OCEAN__PORT__BASE_URL:-}"
              PORT_CLIENT_ID="${OCEAN__PORT__CLIENT_ID:-}"
              PORT_CLIENT_SECRET="${OCEAN__PORT__CLIENT_SECRET:-}"
              INTEGRATION_IDENTIFIER="${OCEAN__INTEGRATION__IDENTIFIER:-}"

              log_warning() { echo "[WARN] $*" >&2; }
              log_error()   { echo "[ERROR] $*" >&2; }
              log_info()    { echo "[INFO] $*" >&2; }

              # Returns current resync id from /isHealthy JSON (empty if none or request failed).
              fetch_resync_id_from_is_healthy() {
                local body
                if ! body=$(curl -sf --max-time "$TIMEOUT_SECONDS" "$IS_HEALTHY_URL" 2>/dev/null); then
                  echo ""
                  return 1
                fi
                echo "$body" | jq -r '.resync_id // empty' 2>/dev/null || echo ""
              }

              # Abort a specific resync in Port (called when /isHealthy resync_id changes so the superseded run is reported).
              abort_resync_to_port() {
                local resync_id="$1"
                [[ -z "$resync_id" ]] && return 0

                local api_url="${PORT_BASE_URL%/}/v1"

                local token_resp
                token_resp=$(curl -sf --max-time 10 -X POST "${api_url}/auth/access_token" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg clientId "$PORT_CLIENT_ID" --arg clientSecret "$PORT_CLIENT_SECRET" '{clientId:$clientId,clientSecret:$clientSecret}')" 2>/dev/null) || return 0
                local token_type token_value
                token_type=$(echo "$token_resp" | jq -r '.tokenType // "Bearer"')
                token_value=$(echo "$token_resp" | jq -r '.accessToken')
                [[ "$token_value" == "null" || -z "$token_value" ]] && return 0
                local auth_header="${token_type} ${token_value}"

                local integ_id_encoded
                integ_id_encoded=$(printf %s "$INTEGRATION_IDENTIFIER" | jq -sRr @uri)

                local abort_url="${api_url}/integration/${integ_id_encoded}/resync/${resync_id}/abort"
                local abort_code
                abort_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 -X POST "$abort_url" \
                  -H "Authorization: $auth_header" 2>/dev/null) || abort_code=000
                if [[ "$abort_code" =~ ^2[0-9][0-9]$ ]]; then
                  log_info "Reported superseded resync aborted to integ-service (resync_id=$resync_id, integrationIdentifier=$INTEGRATION_IDENTIFIER)"
                else
                  log_error "integ-service resync abort returned $abort_code (resync_id=$resync_id)"
                fi
              }

              # Deployment: poll /isHealthy for resync_id; when it changes to a new non-empty id, abort the previous resync in Port.

              last_resync_id=""
              while true; do
                current_resync_id=""
                if current_resync_id=$(fetch_resync_id_from_is_healthy); then
                  if [[ -n "$last_resync_id" && "$last_resync_id" != "$current_resync_id" ]]; then
                    abort_resync_to_port "$last_resync_id"
                  fi
                  last_resync_id="$current_resync_id"
                else
                  log_warning "Failed to GET $IS_HEALTHY_URL (will retry)"
                fi
                sleep "$INTERVAL_SECONDS"
              done
              OCEAN_HEALTHCHECK_SCRIPT
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      {{- end }}
      volumes:
        {{- if .Values.extraVolumes }}
        {{- tpl (toYaml .Values.extraVolumes) . | nindent 8 }}
        {{- end }}
        {{- if eq .Values.integration.processExecution.mode "multi_process" }}
        - name: prometheus-metrics
          emptyDir: {}
        {{- end }}
        {{- if and .Values.selfSignedCertificate.enabled .Values.selfSignedCertificate.secret.useExistingSecret }}
        - name: certificates
          projected:
            sources:
              - secret:
                  name: {{ .Values.selfSignedCertificate.secret.name }}
                  items:
                    - key: {{ .Values.selfSignedCertificate.secret.key }}
                      path: cert.crt
        {{- else if .Values.selfSignedCertificate.enabled }}
        - name: certificates
          projected:
            sources:
              - secret:
                  name: {{ include "port-ocean.selfSignedCertName" . }}
                  items:
                    - key: crt
                      path: cert.crt
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
