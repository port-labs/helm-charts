{{- if eq .Values.workload.kind "CronJob" }}
{{- $maxRunTimeSeconds := "" }}
{{- if (.Values.workload.cron).resyncTimeoutMinutes }}
{{- $minute := 60 }}
{{- $maxRunTimeSeconds = (mul (.Values.workload.cron).resyncTimeoutMinutes $minute )}}
{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "port-ocean.cronJobName" . }}
  labels:
    {{- include "port-ocean.labels" . | nindent 4 }}
spec:
  failedJobsHistoryLimit: {{ .Values.workload.cron.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.workload.cron.successfulJobsHistoryLimit }}
  {{- $scheduleValue := (.Values.scheduledResyncInterval | default "0 */1 * * *") | toString }}
  schedule: {{ if regexMatch "^[\"'].*[\"']$" $scheduleValue }}{{ $scheduleValue }}{{ else }}{{ $scheduleValue | squote }}{{ end }}
  suspend: {{ .Values.workload.cron.suspend }}
  concurrencyPolicy: {{ .Values.scheduleConcurrencyPolicy | default "Replace" }}
  jobTemplate:
    metadata:
      generateName: {{ printf "%s-" (include "port-ocean.metadataNamePrefixShort" .) | quote }}
      namespace: {{ .Release.Namespace }}
      labels:
        app: {{ include "port-ocean.cronJobName" . }}
        integrationUniqueCronKey: {{ .Release.Name }}
        {{- include "port-ocean.selectorLabels" . | indent 8 }}
    spec:
      backoffLimit: 0
      {{- if $maxRunTimeSeconds }}
      activeDeadlineSeconds: {{ $maxRunTimeSeconds }}
      {{- end }}
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            app: {{ include "port-ocean.cronJobName" . }}
            {{- include "port-ocean.labels" . | nindent 12 }}
        spec:
          {{- if or .Values.podServiceAccount.name .Values.podServiceAccount.create }}
          serviceAccountName: {{ include "port-ocean.serviceAccountName" . }}
          {{- end }}
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- if .Values.podSecurityContext }}
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
            {{- end }}
          initContainers:
            {{- if .Values.extraInitContainers }}
            {{- tpl (toYaml .Values.extraInitContainers) . | nindent 12 }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: wait-for-postgresql
              image: {{ .Values.postgresql.image }}
              command:
                - sh
                - -c
                - |
                  until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.global.postgresql.auth.username }}; do
                    echo "Waiting for PostgreSQL to be ready..."
                    sleep 2
                  done
                  echo "PostgreSQL is ready!"
            {{- end }}
            - name: terminate-old-resync-jobs
              image: {{ .Values.workload.cron.kubectlImage }}
              env:
                - name: JOB_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['job-name']
                - name: TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "port-ocean.cron.job-query-rbac-prefix" . }}-sa-token
                      key: token
              command:
                - /bin/bash
                - -c
                - |
                  #!/bin/bash
                  echo "Starting init container"
                  LABEL_SELECTOR="integrationUniqueCronKey={{ .Release.Name }}"
                  NAMESPACE="{{ .Release.Namespace }}"
                  CURRENT_JOB_NAME=$(JOB_NAME)
                  DEADLINE=0  # 30 seconds deadline for the jobs to terminate

                  echo "kubectl get jobs -l ${LABEL_SELECTOR} -o=json | jq -r \".items[] | select(.status.active > 0) | select(.metadata.name != \"$CURRENT_JOB_NAME\") | .metadata.name\""
                  JOBS=$(kubectl get jobs -l ${LABEL_SELECTOR} -o=json --token=$TOKEN | jq -r ".items[] | select(.status.active > 0) | select(.metadata.name != \"$CURRENT_JOB_NAME\") | .metadata.name")
                  if [ -n "$JOBS" ]; then
                    echo "Found jobs: $JOBS"
                    for JOB in $JOBS; do
                      echo "Setting deadline for job: $JOB"
                      kubectl patch job $JOB -n ${NAMESPACE} -p "{\"spec\":{\"activeDeadlineSeconds\":$DEADLINE}, \"metadata\":{\"labels\":{\"canceled\": \"$CURRENT_JOB_NAME\"}}}" --token=$TOKEN
                    done
                    for JOB in $JOBS; do
                      echo "Waiting for job $JOB to terminate"
                      kubectl wait --for=delete pod --selector=job-name=$JOB --timeout=60s -n ${NAMESPACE} --token=$TOKEN || (echo "Job $JOB did not terminate in time. Cannot start new job: $CURRENT_JOB_NAME" && exit 1)
                      echo "Done"
                    done
                  else
                    echo "No running resync jobs found. Starting new job: $CURRENT_JOB_NAME"
                  fi

                  # Rollout live events deployment if exists to match integration image versions
                  rollout_if_exists() {
                    local DEPLOYMENT_NAME=$1

                    echo "Running: kubectl get deployment ${DEPLOYMENT_NAME} -o=json | jq -r \".metadata.name\""
                    DEPLOYMENT=$(kubectl get deployment ${DEPLOYMENT_NAME} --token=$TOKEN -o=json | jq -r ".metadata.name")

                    if [ -n "$DEPLOYMENT" ]; then
                      echo "Found deployment: $DEPLOYMENT"
                      echo "Rolling out $DEPLOYMENT"
                      kubectl rollout restart deployment $DEPLOYMENT -n ${NAMESPACE} --token=$TOKEN
                    else
                      echo "Deployment $DEPLOYMENT_NAME does not exist. Skipping rollout restart."
                    fi
                  }

                  rollout_if_exists {{ include "port-ocean.liveEvents.deploymentName" . }}
                  rollout_if_exists {{ include "port-ocean.actionsProcessor.deploymentName" . }}

                  echo "Exiting init container"
          containers:
          - name: {{ include "port-ocean.containerName" . }}
            imagePullPolicy: {{ .Values.imagePullPolicy }}
            image: {{ include "port-ocean.image" . }}
            {{- if .Values.service.enabled }}
            securityContext:
              {{- if .Values.containerSecurityContext }}
              {{- toYaml .Values.containerSecurityContext | nindent 14 }}
              {{- end }}
            resources:
              {{- if .Values.resources }}
              {{- toYaml .Values.resources | nindent 14 }}
              {{- end }}
            ports:
            - containerPort: {{.Values.service.port}}
              protocol: TCP
            {{- end }}
            {{- if or .Values.selfSignedCertificate.enabled .Values.postgresql.enabled .Values.extraEnv }}
            env:
            {{- if .Values.selfSignedCertificate.enabled }}
              - name: SSL_CERT_FILE
                value: /etc/ssl/certs/ca-certificates.crt
              - name: REQUESTS_CA_BUNDLE
                value: /etc/ssl/certs/ca-certificates.crt
            {{- end }}
            {{- if .Values.postgresql.enabled }}
              - name: OCEAN__DATABASE__HOST
                value: {{ include "port-ocean.name" . }}-postgresql
              - name: OCEAN__DATABASE__PORT
                value: '5432'
              - name: OCEAN__DATABASE__NAME
                value: {{ .Values.postgresql.global.postgresql.auth.database }}
              - name: OCEAN__DATABASE__USERNAME
                value: {{ .Values.postgresql.global.postgresql.auth.username }}
              - name: OCEAN__DATABASE__PASSWORD
                value: {{ .Values.postgresql.global.postgresql.auth.password }}
            {{- end }}
            {{- if .Values.extraEnv }}
              {{- tpl (toYaml .Values.extraEnv) . | nindent 14 }}
            {{- end }}
            {{- end }}
            envFrom:
              - configMapRef:
                  name: {{ include "port-ocean.configMapName" . }}
              {{- include "port-ocean.additionalSecrets" . | nindent 14 }}
            volumeMounts:
            {{- if .Values.extraVolumeMounts }}
              {{- tpl (toYaml .Values.extraVolumeMounts) . | nindent 14 }}
            {{- end }}
            {{- if .Values.selfSignedCertificate.enabled }}
              - name: certificates
                mountPath: /usr/local/share/ca-certificates/cert.crt
                subPath: cert.crt
                readOnly: true
            {{- end }}
            {{- if eq .Values.integration.processExecution.mode "multi_process" }}
              - name: prometheus-metrics
                mountPath: "{{ .Values.integration.processExecution.prometheusMultiProcessDir }}"
            {{- end }}
            {{- if .Values.healthChecker.enabled }}
          - name: health-checker
            image: {{ .Values.healthChecker.image }}
            imagePullPolicy: {{ .Values.imagePullPolicy }}
            env:
              - name: OCEAN_HEALTH_CHECKER__INTERVAL_SECONDS
                value: {{ .Values.healthChecker.intervalSeconds | default 10 | quote }}
              - name: OCEAN_HEALTH_CHECKER__FAILURE_THRESHOLD
                value: {{ .Values.healthChecker.failureThreshold | default 3 | quote }}
            envFrom:
              - configMapRef:
                  name: {{ include "port-ocean.configMapName" . }}
              {{- include "port-ocean.additionalSecrets" . | nindent 14 }}
            command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  IS_HEALTHY_URL="http://localhost:{{.Values.service.port}}/isHealthy"
                  INTERVAL_SECONDS="${OCEAN_HEALTH_CHECKER__INTERVAL_SECONDS:-10}"
                  FAILURE_THRESHOLD="${OCEAN_HEALTH_CHECKER__FAILURE_THRESHOLD:-3}"
                  TIMEOUT_SECONDS="${OCEAN_HEALTH_CHECKER__TIMEOUT_SECONDS:-5}"

                  PORT_BASE_URL="${OCEAN__PORT__BASE_URL:-}"
                  PORT_CLIENT_ID="${OCEAN__PORT__CLIENT_ID:-}"
                  PORT_CLIENT_SECRET="${OCEAN__PORT__CLIENT_SECRET:-}"
                  INTEGRATION_IDENTIFIER="${OCEAN__INTEGRATION__IDENTIFIER:-}"

                  log_warning() { echo "[WARN] $*" >&2; }
                  log_error()   { echo "[ERROR] $*" >&2; }
                  log_info()    { echo "[INFO] $*" >&2; }

                  check_health() {
                    curl -sf --max-time "$TIMEOUT_SECONDS" "$IS_HEALTHY_URL" > /dev/null
                  }

                  # Report resync aborted to Port
                  report_resync_aborted_to_port() {
                    if [[ -z "$PORT_BASE_URL" || -z "$PORT_CLIENT_ID" || -z "$PORT_CLIENT_SECRET" || -z "$INTEGRATION_IDENTIFIER" ]]; then
                      return 0
                    fi

                    local api_url="${PORT_BASE_URL%/}/v1"

                    # Get access token
                    local token_resp
                    token_resp=$(curl -sf --max-time 10 -X POST "${api_url}/auth/access_token" \
                      -H "Content-Type: application/json" \
                      -d "$(jq -n --arg clientId "$PORT_CLIENT_ID" --arg clientSecret "$PORT_CLIENT_SECRET" '{clientId:$clientId,clientSecret:$clientSecret}')" 2>/dev/null) || return 0
                    local token_type token_value
                    token_type=$(echo "$token_resp" | jq -r '.tokenType // "Bearer"')
                    token_value=$(echo "$token_resp" | jq -r '.accessToken')
                    [[ "$token_value" == "null" || -z "$token_value" ]] && return 0
                    local auth_header="${token_type} ${token_value}"

                    # Get integration (for _id)
                    local integ_id_encoded
                    integ_id_encoded=$(printf %s "$INTEGRATION_IDENTIFIER" | jq -sRr @uri)
                    local integ_resp
                    integ_resp=$(curl -sf --max-time 10 -X GET "${api_url}/integration/${integ_id_encoded}" \
                      -H "Authorization: $auth_header" 2>/dev/null) || return 0
                    local integration_internal_id
                    integration_internal_id=$(echo "$integ_resp" | jq -r '.integration._id')
                    [[ "$integration_internal_id" == "null" || -z "$integration_internal_id" ]] && return 0

                    # Get latest resync id
                    local internal_id_encoded
                    internal_id_encoded=$(printf %s "$integration_internal_id" | jq -sRr @uri)
                    local syncs_resp
                    syncs_resp=$(curl -sf --max-time 10 -X GET "${api_url}/integration/${internal_id_encoded}/syncsMetadata" \
                      -H "Authorization: $auth_header" 2>/dev/null) || return 0
                    local sync_state
                    sync_state=$(echo "$syncs_resp" | jq -r '.data[0].syncState // empty')
                    [[ "$sync_state" != "syncing" ]] && return 0
                    local resync_id
                    resync_id=$(echo "$syncs_resp" | jq -r '.data[0].eventId // empty')
                    [[ -z "$resync_id" ]] && return 0

                    local abort_url="${api_url}/integration/${integ_id_encoded}/resync/${resync_id}/abort"
                    local abort_code
                    abort_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 -X POST "$abort_url" \
                      -H "Authorization: $auth_header" 2>/dev/null) || abort_code=000
                    if [[ "$abort_code" =~ ^2[0-9][0-9]$ ]]; then
                      log_info "Reported resync aborted to integ-service (integrationIdentifier=$INTEGRATION_IDENTIFIER)"
                    else
                      log_error "integ-service resync abort returned $abort_code"
                    fi
                  }

                  # After the integration exits (ONCE), /isHealthy fails repeatedly until FAILURE_THRESHOLD;
                  # exit 0 so the Job can succeed if the main container already completed (exit 1 would fail the Pod).

                  consecutive_failures=0
                  while true; do
                    if check_health; then
                      consecutive_failures=0
                    else
                      ((consecutive_failures++)) || true
                      if [[ "$consecutive_failures" -ge "$FAILURE_THRESHOLD" ]]; then
                        report_resync_aborted_to_port
                        log_warning "Health check failed $FAILURE_THRESHOLD times in a row (url=$IS_HEALTHY_URL); exiting so CronJob can complete."
                        exit 0
                      fi
                      log_warning "Health check failed (attempt $consecutive_failures/$FAILURE_THRESHOLD)"
                    fi
                    sleep "$INTERVAL_SECONDS"
                  done
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "100m"
            {{- end }}
          volumes:
            {{- if .Values.extraVolumes }}
            {{- tpl (toYaml .Values.extraVolumes) . | nindent 12 }}
            {{- end }}
            {{- if eq .Values.integration.processExecution.mode "multi_process" }}
            - name: prometheus-metrics
              emptyDir: {}
            {{- end }}
            {{- if and .Values.selfSignedCertificate.enabled .Values.selfSignedCertificate.secret.useExistingSecret }}
            - name: certificates
              projected:
                sources:
                  - secret:
                      name: {{ .Values.selfSignedCertificate.secret.name }}
                      items:
                        - key: {{ .Values.selfSignedCertificate.secret.key }}
                          path: cert.crt
            {{- else if .Values.selfSignedCertificate.enabled }}
            - name: certificates
              projected:
                sources:
                  - secret:
                      name: {{ include "port-ocean.selfSignedCertName" . }}
                      items:
                        - key: crt
                          path: cert.crt
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
